<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Instagram Crawler</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Instagram Crawler</h1>
      <div id="hashtag-label" class="hashtag">—</div>
    </header>

    <section class="status-bar">
      <span id="status-text">Open a hashtag page on Instagram</span>
      <span id="post-count" class="badge">0</span>
    </section>

    <p class="hint">Scroll down on Instagram — posts are collected automatically.</p>

    <section class="actions">
      <button id="btn-export-csv" class="btn btn-primary" disabled>Export CSV</button>
      <button id="btn-clear" class="btn btn-ghost">Clear Data</button>
    </section>

    <div id="post-list" class="post-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
