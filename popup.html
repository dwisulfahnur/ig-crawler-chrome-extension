<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Instagram Crawler</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Instagram Crawler</h1>
      <div id="hashtag-label" class="hashtag">—</div>
    </header>

    <section class="status-bar">
      <span id="status-text">Open a hashtag page on Instagram</span>
      <span id="post-count" class="badge">0</span>
    </section>

    <section class="autoscroll-row">
      <label class="toggle-label">
        <input type="checkbox" id="chk-autoscroll" />
        <span>Auto scroll</span>
      </label>
      <select id="sel-scroll-speed" disabled>
        <option value="3000">Slow (3s)</option>
        <option value="2000" selected>Normal (2s)</option>
        <option value="1000">Fast (1s)</option>
      </select>
    </section>

    <section class="actions">
      <button id="btn-export-csv" class="btn btn-primary" disabled>Export CSV</button>
      <button id="btn-clear" class="btn btn-ghost">Clear Data</button>
    </section>

    <div id="post-list" class="post-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
