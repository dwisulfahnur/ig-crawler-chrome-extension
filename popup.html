<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Crawler</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Instagram Crawler</h1>
    </header>

    <section class="status-bar">
      <span id="status-text">Ready</span>
      <span id="post-count" class="badge">0 posts</span>
    </section>

    <section class="controls">
      <div class="form-group">
        <label for="scroll-limit">Max posts to collect</label>
        <input type="number" id="scroll-limit" value="50" min="1" max="500" />
      </div>

      <div class="form-group">
        <label for="scroll-delay">Scroll delay (ms)</label>
        <input type="number" id="scroll-delay" value="1500" min="500" max="10000" step="100" />
      </div>
    </section>

    <section class="actions">
      <button id="btn-start" class="btn btn-primary">Start Crawling</button>
      <button id="btn-stop" class="btn btn-danger" disabled>Stop</button>
      <button id="btn-export-json" class="btn btn-secondary" disabled>Export JSON</button>
      <button id="btn-export-csv" class="btn btn-secondary" disabled>Export CSV</button>
      <button id="btn-clear" class="btn btn-ghost">Clear Data</button>
    </section>

    <section class="preview">
      <h2>Collected Posts <span id="preview-count"></span></h2>
      <div id="post-list" class="post-list"></div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
